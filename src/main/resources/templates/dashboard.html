<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Dashboard')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">📊 Tổng quan hệ thống</h1>

    <!-- Hàng card thống kê -->
    <div class="row g-4">
        <!-- Tổng số sách -->
        <div class="col-md-4 col-lg-3">
            <div class="card text-white bg-primary shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-subtitle mb-1 opacity-75">📚 Tổng số sách</h6>
                            <h2 class="card-title mb-0" th:text="${totalBooks}">0</h2>
                        </div>
                        <i class="bi bi-book fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sách có sẵn -->
        <div class="col-md-4 col-lg-3">
            <div class="card text-white bg-success shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-subtitle mb-1 opacity-75">✅ Có sẵn</h6>
                            <h2 class="card-title mb-0" th:text="${availableBooks}">0</h2>
                        </div>
                        <i class="bi bi-check-circle fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Đang mượn -->
        <div class="col-md-4 col-lg-3">
            <div class="card text-white bg-warning shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-subtitle mb-1 opacity-75">📖 Đang mượn</h6>
                            <h2 class="card-title mb-0" th:text="${borrowedBooks}">0</h2>
                        </div>
                        <i class="bi bi-bookmark fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quá hạn -->
        <div class="col-md-4 col-lg-3">
            <div class="card text-white bg-danger shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-subtitle mb-1 opacity-75">⏰ Quá hạn</h6>
                            <h2 class="card-title mb-0" th:text="${overdueBooks}">0</h2>
                        </div>
                        <i class="bi bi-exclamation-triangle fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Số độc giả -->
        <div class="col-md-4 col-lg-3">
            <div class="card text-white bg-info shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-subtitle mb-1 opacity-75">👥 Độc giả</h6>
                            <h2 class="card-title mb-0" th:text="${totalUsers}">0</h2>
                        </div>
                        <i class="bi bi-people fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hành động nhanh -->
    <hr class="my-5">
    <h4 class="mb-3">⚡ Hành động nhanh</h4>
    <div class="d-flex flex-wrap gap-2">
        <a th:href="@{/books}" class="btn btn-outline-primary btn-lg">📚 Quản lý sách</a>
        <a th:href="@{/users}" class="btn btn-outline-secondary btn-lg">👥 Quản lý người dùng</a>
        <a th:href="@{/overdue}" class="btn btn-outline-danger btn-lg">⚠️ Sách quá hạn</a>
        <a th:href="@{/history}" class="btn btn-outline-dark btn-lg">📋 Lịch sử mượn/trả</a>
    </div>
</div>
</body>
</html>
