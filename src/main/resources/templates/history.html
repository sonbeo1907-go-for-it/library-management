<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Lịch sử mượn/trả')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">📋 Lịch sử mượn/trả</h1>

    <!-- Thông báo -->
    <div th:if="${successMessage}" class="alert alert-success auto-hide" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger auto-hide" th:text="${errorMessage}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>Tên sách</th>
                <th sec:authorize="hasRole('LIBRARIAN')">Người mượn</th>
                <th>Ngày mượn</th>
                <th>Hạn trả</th>
                <th>Ngày trả</th>
                <th>Trạng thái</th>
                <th>Phí phạt</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="record : ${records}">
                <!-- Tên sách (dùng DTO) -->
                <td>
                    <a th:href="@{/books/{id}(id=${record.bookId})}" th:text="${record.bookTitle}">Tên sách</a>
                </td>

                <!-- Người mượn (chỉ Librarian) -->
                <td sec:authorize="hasRole('LIBRARIAN')" th:text="${record.borrowerName}">Người mượn</td>

                <!-- Ngày mượn -->
                <td th:text="${#temporals.format(record.borrowDate, 'dd/MM/yyyy')}">01/01/2024</td>

                <!-- Hạn trả -->
                <td th:text="${#temporals.format(record.dueDate, 'dd/MM/yyyy')}">15/01/2024</td>

                <!-- Ngày trả -->
                <td>
                    <span th:if="${record.returnDate}" th:text="${#temporals.format(record.returnDate, 'dd/MM/yyyy')}"></span>
                    <span th:unless="${record.returnDate}" class="text-muted">—</span>
                </td>

                <!-- Trạng thái (status là String trong DTO) -->
                <td>
                    <span th:if="${record.status == 'BORROWED'}" class="badge bg-warning text-dark">Đang mượn</span>
                    <span th:if="${record.status == 'RETURNED'}" class="badge bg-success">Đã trả</span>
                </td>

                <!-- Phí phạt -->
                <td>
                    <span th:if="${!record.formattedFineAmount.isEmpty()}" th:text="${record.formattedFineAmount}"></span>
                    <span th:unless="${!record.formattedFineAmount.isEmpty()}" class="text-muted">—</span>
                </td>

                <!-- Hành động -->
                <td>
                    <div class="d-flex gap-1">
                        <!-- Nút Trả sách (chỉ Librarian, và sách đang mượn) -->
                        <span sec:authorize="hasRole('LIBRARIAN')" th:if="${record.status == 'BORROWED'}">
                                <a th:href="@{/return/{id}(id=${record.id})}" class="btn btn-sm btn-success">↩️ Trả sách</a>
                            </span>

                        <!-- Nút Đánh giá (người mượn, sách đã trả) -->
                        <span th:if="${record.status == 'RETURNED' and record.borrowerId == currentUserId}">
                                <a th:href="@{/review(bookId=${record.bookId})}" class="btn btn-sm btn-outline-warning">⭐ Đánh giá</a>
                            </span>
                    </div>
                </td>
            </tr>

            <!-- Dòng trống nếu không có bản ghi -->
            <tr th:if="${#lists.isEmpty(records)}">
                <td th:attr="colspan=${#authorization.expression('hasRole(''LIBRARIAN'')') ? 8 : 7}" class="text-center text-muted">
                    Không có lịch sử mượn/trả nào.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
