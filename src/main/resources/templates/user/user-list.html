<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Quản lý người dùng')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">👥 Quản lý người dùng</h1>

    <!-- Thông báo -->
    <div th:if="${successMessage}" class="alert alert-success auto-hide" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger auto-hide" th:text="${errorMessage}"></div>

    <!-- Nút thêm mới -->
    <div class="mb-3">
        <a th:href="@{/users/new}" class="btn btn-primary">➕ Thêm người dùng mới</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Username</th>
                <th>Họ tên</th>
                <th>Vai trò</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.username}">username</td>
                <td th:text="${user.fullName}">Họ tên</td>
                <td>
                    <span th:if="${user.role.name() == 'ADMIN'}" class="badge bg-danger">Quản trị viên</span>
                    <span th:if="${user.role.name() == 'LIBRARIAN'}" class="badge bg-primary">Thủ thư</span>
                    <span th:if="${user.role.name() == 'READER'}" class="badge bg-secondary">Độc giả</span>
                </td>
                <td>
                    <div class="d-flex gap-1">
                        <!-- Chỉ hiển thị nút sửa/xóa nếu KHÔNG phải ADMIN -->
                        <a th:if="${user.role.name() != 'ADMIN'}"
                           th:href="@{/users/{id}/edit(id=${user.id})}"
                           class="btn btn-sm btn-warning">✏️ Sửa</a>
                        <a th:if="${user.role.name() != 'ADMIN'}"
                           th:href="@{/users/{id}/delete(id=${user.id})}"
                           class="btn btn-sm btn-danger confirm-delete">🗑️ Xóa</a>

                        <!-- Hiển thị thông báo nếu là ADMIN -->
                        <span th:if="${user.role.name() == 'ADMIN'}" class="text-muted small">Không thể chỉnh sửa</span>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="4" class="text-center text-muted">Chưa có người dùng nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
