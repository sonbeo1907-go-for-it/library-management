<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Chi tiết sách')}">
<body>
<div th:fragment="content">
    <div th:if="${successMessage}" class="alert alert-success auto-hide" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger auto-hide" th:text="${errorMessage}"></div>

    <div class="row">
        <div class="col-md-4 text-center mb-4">
            <!-- Có tên ảnh -> thử load, lỗi thì fallback sample.png -->
            <img th:if="${book.imageFilename != null and !book.imageFilename.isEmpty()}"
                 th:src="@{/uploads/{filename}(filename=${book.imageFilename})}"
                 onerror="this.onerror=null; this.src='/uploads/sample.png';"
                 class="img-fluid rounded shadow" alt="Ảnh bìa">
            <!-- Không có tên ảnh -> dùng thẳng sample.png -->
            <img th:unless="${book.imageFilename != null and !book.imageFilename.isEmpty()}"
                 th:src="@{/uploads/sample.png}"
                 class="img-fluid rounded shadow" alt="Ảnh bìa">
        </div>
        <div class="col-md-8">
            <h2 th:text="${book.title}">Tên sách</h2>
            <p class="text-muted">Tác giả: <strong th:text="${book.author}">Tác giả</strong></p>
            <p>Nhà xuất bản: <span th:text="${book.publisher}">NXB</span></p>
            <p>Năm xuất bản: <span th:text="${book.year}">2024</span></p>
            <p>Số lượng có sẵn: <span th:text="${book.quantity}">0</span></p>

            <!-- Đánh giá trung bình -->
            <div class="mb-3">
                <span th:if="${averageRating > 0}">
                    <span class="text-warning h4" th:text="${#numbers.formatDecimal(averageRating, 1, 1)}">0.0</span>
                    <span class="text-warning">⭐</span>
                </span>
                <span th:unless="${averageRating > 0}" class="text-muted">Chưa có đánh giá</span>
                <span class="text-muted">(<span th:text="${reviewCount}">0</span> đánh giá)</span>
            </div>

            <div class="d-flex flex-wrap gap-2">
                <form th:action="@{/cart/add/{bookId}(bookId=${book.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-primary" th:if="${book.quantity > 0}">📚 Thêm vào giỏ</button>
                </form>
                <a th:if="${canReview}" th:href="@{/review(bookId=${book.id})}" class="btn btn-outline-warning">⭐ Đánh giá</a>

                <span sec:authorize="hasAnyRole('LIBRARIAN','ADMIN')">
                    <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-warning">✏️ Sửa</a>
                    <a th:href="@{/books/{id}/delete(id=${book.id})}" class="btn btn-danger confirm-delete">🗑️ Xóa</a>
                </span>
            </div>
        </div>
    </div>

    <!-- Danh sách đánh giá -->
    <hr class="my-5">
    <h3>📝 Đánh giá từ độc giả</h3>
    <div th:if="${#lists.isEmpty(reviews)}">
        <p class="text-muted">Chưa có đánh giá nào cho cuốn sách này.</p>
    </div>
    <div th:each="review : ${reviews}" class="card mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title" th:text="${review.reviewerName}">Người dùng</h5>
                <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}">Ngày</small>
            </div>
            <div class="text-warning mb-2">
                <span th:each="i : ${#numbers.sequence(1, review.rating)}">⭐</span>
            </div>
            <p class="card-text" th:text="${review.comment}">Nhận xét</p>
        </div>
    </div>
</div>
</body>
</html>
