<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Đổi mật khẩu')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">🔒 Đổi mật khẩu</h1>

    <!-- Thông báo -->
    <div th:if="${successMessage}" class="alert alert-success auto-hide" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger auto-hide" th:text="${errorMessage}"></div>

    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Thay đổi mật khẩu</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/change-password}" method="post">
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label">Mật khẩu cũ</label>
                            <input type="password" name="oldPassword" id="oldPassword" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Mật khẩu mới</label>
                            <input type="password" name="newPassword" id="newPassword" class="form-control" required minlength="6">
                            <small class="text-muted">Ít nhất 6 ký tự.</small>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Xác nhận mật khẩu mới</label>
                            <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" required minlength="6">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">🔑 Đổi mật khẩu</button>
                            <a th:href="@{/templates/profile}" class="btn btn-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
