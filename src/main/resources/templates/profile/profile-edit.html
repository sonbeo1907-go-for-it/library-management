<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Chỉnh sửa hồ sơ')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">✏️ Chỉnh sửa hồ sơ</h1>

    <!-- Thông báo -->
    <div th:if="${errorMessage}" class="alert alert-danger auto-hide" th:text="${errorMessage}"></div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Cập nhật thông tin cá nhân</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/edit}" method="post" th:object="${user}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Tên đăng nhập</label>
                            <input type="text" th:field="*{username}" id="username" class="form-control" readonly>
                            <small class="text-muted">Không thể thay đổi tên đăng nhập.</small>
                        </div>
                        <div class="mb-3">
                            <label for="fullName" class="form-label">Họ tên <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{fullName}" id="fullName" class="form-control" required>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">💾 Lưu</button>
                            <a th:href="@{/templates/profile}" class="btn btn-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
