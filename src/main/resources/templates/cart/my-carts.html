<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Yêu cầu mượn sách')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">📋 Yêu cầu mượn sách của bạn</h1>

    <div th:if="${successMessage}" class="alert alert-success auto-hide" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger auto-hide" th:text="${errorMessage}"></div>

    <div th:if="${page == null || page.content.isEmpty()}" class="alert alert-info">
        Bạn chưa có yêu cầu mượn sách nào.
        <a th:href="@{/books}" class="alert-link">Xem danh sách sách</a>
    </div>

    <div th:each="cart : ${page.content}" class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <div>
                <strong>Mã giỏ:</strong>
                <span class="badge bg-primary fs-5" th:text="${cart.cartCode}">ABC123</span>
                <span class="ms-3">
                    Trạng thái:
                    <span th:if="${cart.status.name() == 'SUBMITTED'}" class="badge bg-warning text-dark">Chờ duyệt</span>
                    <span th:if="${cart.status.name() == 'APPROVED'}" class="badge bg-success">Đã duyệt</span>
                    <span th:if="${cart.status.name() == 'REJECTED'}" class="badge bg-danger">Từ chối</span>
                </span>
            </div>
            <small class="text-muted" th:text="${cart.submittedAt != null ? #temporals.format(cart.submittedAt, 'dd/MM/yyyy HH:mm') : #temporals.format(cart.createdAt, 'dd/MM/yyyy HH:mm')}"></small>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-sm table-bordered">
                    <thead>
                    <tr>
                        <th>Ảnh bìa</th>
                        <th>Tên sách</th>
                        <th>Tác giả</th>
                        <th>Phí mượn</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${cart.items}">
                        <td>
                            <img th:if="${item.imageFilename != null && !item.imageFilename.isEmpty()}"
                                 th:src="@{/uploads/{filename}(filename=${item.imageFilename})}"
                                 onerror="this.onerror=null; this.src='/uploads/sample.png';"
                                 width="40" class="img-thumbnail" alt="Ảnh bìa">
                            <img th:unless="${item.imageFilename != null && !item.imageFilename.isEmpty()}"
                                 th:src="@{/uploads/sample.png}"
                                 width="40" class="img-thumbnail" alt="Ảnh bìa">
                        </td>
                        <td th:text="${item.bookTitle}">Tên sách</td>
                        <td th:text="${item.bookAuthor}">Tác giả</td>
                        <td th:text="${item.formattedFeePerItem}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-2">
                <div>
                    <strong>Tổng phí:</strong> <span th:text="${cart.formattedTotalFee}"></span>
                </div>
                <button th:if="${cart.status.name() == 'SUBMITTED'}" class="btn btn-outline-info btn-sm"
                        data-bs-toggle="modal" th:data-bs-target="'#qrModal' + ${cart.cartCode}">
                    📱 Hiện mã QR
                </button>
            </div>
        </div>
        <!-- Modal QR Code -->
        <div th:id="'qrModal' + ${cart.cartCode}" class="modal fade" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Mã QR giỏ hàng <span th:text="${cart.cartCode}"></span></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-center">
                        <!-- Thay thế div cũ: dùng class qr-container và data-cart-code -->
                        <div class="qr-container" th:attr="data-cart-code=${cart.cartCode}"
                             style="width:256px; height:256px; margin:0 auto;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script tập trung xử lý QR khi modal mở -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.modal').forEach(function(modal) {
                modal.addEventListener('shown.bs.modal', function() {
                    var qrDiv = modal.querySelector('.qr-container');
                    if (qrDiv && !qrDiv.hasChildNodes()) {
                        var cartCode = qrDiv.getAttribute('data-cart-code');
                        new QRCode(qrDiv, {
                            text: cartCode,
                            width: 256,
                            height: 256
                        });
                    }
                });
            });
        });
        /*]]>*/
    </script>

    <!-- PHÂN TRANG -->
    <nav aria-label="Page navigation" th:if="${page.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link" th:href="@{/my-carts(page=${page.number - 1}, size=${page.size})}" th:unless="${page.first}">« Trước</a>
                <span class="page-link" th:if="${page.first}">« Trước</span>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                th:classappend="${i == page.number} ? 'active'">
                <a class="page-link" th:href="@{/my-carts(page=${i}, size=${page.size})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link" th:href="@{/my-carts(page=${page.number + 1}, size=${page.size})}" th:unless="${page.last}">Sau »</a>
                <span class="page-link" th:if="${page.last}">Sau »</span>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
