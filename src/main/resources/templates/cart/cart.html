<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Giỏ hàng')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">🛒 Giỏ hàng của bạn</h1>

    <!-- Thông báo -->
    <div th:if="${successMessage}" class="alert alert-success auto-hide" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger auto-hide" th:text="${errorMessage}"></div>

    <!-- Trường hợp giỏ trống hoặc không tồn tại -->
    <div th:if="${cart == null || cart.items == null || #lists.isEmpty(cart.items)}">
        <div class="alert alert-info">
            Giỏ hàng của bạn đang trống.
            <a th:href="@{/books}" class="alert-link">Quay lại danh sách sách</a> để thêm vào giỏ.
        </div>
    </div>

    <!-- Khi có ít nhất một sách trong giỏ -->
    <div th:if="${cart != null && cart.items != null && !#lists.isEmpty(cart.items)}">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead>
                <tr>
                    <th>Ảnh bìa</th>
                    <th>Tên sách</th>
                    <th>Tác giả</th>
                    <th>Phí mượn (VNĐ)</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cart.items}">
                    <td>
                        <!-- Có tên ảnh -> thử load, lỗi thì fallback sample.png -->
                        <img th:if="${item.imageFilename != null && !item.imageFilename.isEmpty()}"
                             th:src="@{/uploads/{filename}(filename=${item.imageFilename})}"
                             onerror="this.onerror=null; this.src='/uploads/sample.png';"
                             width="50" class="img-thumbnail" alt="Ảnh bìa">
                        <!-- Không có tên ảnh -> dùng thẳng sample.png -->
                        <img th:unless="${item.imageFilename != null && !item.imageFilename.isEmpty()}"
                             th:src="@{/uploads/sample.png}"
                             width="50" class="img-thumbnail" alt="Ảnh bìa">
                    </td>
                    <td>
                        <a th:href="@{/books/{id}(id=${item.bookId})}" th:text="${item.bookTitle}">Tên sách</a>
                    </td>
                    <td th:text="${item.bookAuthor}">Tác giả</td>
                    <td th:text="${item.formattedFeePerItem}"></td>
                    <td>
                        <form th:action="@{/cart/remove/{cartItemId}(cartItemId=${item.itemId})}"
                              method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-danger confirm-delete">🗑️ Xóa</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Tổng phí và nút gửi duyệt -->
        <div class="d-flex justify-content-between align-items-center mt-4">
            <h4>
                Tổng phí:
                <span th:if="${cart.formattedTotalFee != null}" th:text="${cart.formattedTotalFee}"></span>
                <span th:unless="${cart.formattedTotalFee != null}">0 VNĐ</span>
            </h4>
            <form th:action="@{/cart/submit}" method="post">
                <button type="submit" class="btn btn-primary btn-lg">📤 Gửi duyệt mượn</button>
            </form>
        </div>
        <p class="text-muted mt-2">Sau khi gửi, bạn cần đến quầy thủ thư để hoàn tất mượn sách.</p>
    </div>
</div>
</body>
</html>
