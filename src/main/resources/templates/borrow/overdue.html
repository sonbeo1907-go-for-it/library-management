<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Sách quá hạn')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">⚠️ Sách quá hạn chưa trả</h1>

    <div th:if="${successMessage}" class="alert alert-success auto-hide" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger auto-hide" th:text="${errorMessage}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Tên sách</th>
                <th>Người mượn</th>
                <th>Ngày mượn</th>
                <th>Hạn trả</th>
                <th>Số ngày quá hạn</th>
                <th>Phí phạt</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="record : ${records}">
                <td>
                    <a th:href="@{/books/{id}(id=${record.bookId})}" th:text="${record.bookTitle}">Tên sách</a>
                </td>
                <td th:text="${record.borrowerName}">Người mượn</td>
                <td th:text="${#temporals.format(record.borrowDate, 'dd/MM/yyyy')}"></td>
                <td th:text="${#temporals.format(record.dueDate, 'dd/MM/yyyy')}"></td>
                <td>
                    <span th:text="${record.daysLate}">0</span> ngày
                </td>
                <td>
                    <span th:if="${!record.formattedFineAmount.isEmpty()}" th:text="${record.formattedFineAmount}"></span>
                    <span th:unless="${!record.formattedFineAmount.isEmpty()}" class="text-muted">—</span>
                </td>
                <td>
                    <a th:href="@{/return/{id}(id=${record.id})}" class="btn btn-sm btn-success">↩️ Trả sách</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(records)}">
                <td colspan="6" class="text-center text-muted">Không có sách quá hạn nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
