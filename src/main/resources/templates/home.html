<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main.html :: layout(pageTitle='Trang chủ')}">
<body>
<div th:fragment="content">
    <!-- Lời chào -->
    <div class="mb-4">
        <h1 class="display-5">👋 Xin chào, <span sec:authentication="name">Bạn</span>!</h1>
        <p>
            <span sec:authorize="hasRole('LIBRARIAN')">Thủ thư</span>
            <span sec:authorize="hasRole('READER')">Độc giả</span>
        </p>
    </div>

    <!-- Dashboard cho Thủ thư -->
    <div sec:authorize="hasAnyRole('LIBRARIAN','ADMIN')">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <!-- Các card thống kê... (giữ nguyên) -->
        </div>
        <hr class="my-4">
        <h4>⚡ Hành động nhanh</h4>
        <div class="d-flex flex-wrap gap-2">
            <!-- Các nút hành động... (giữ nguyên) -->
        </div>
    </div>

    <!-- Dashboard cho Độc giả -->
    <div sec:authorize="!hasAnyRole('LIBRARIAN','ADMIN')">
        <div class="row row-cols-1 row-cols-md-2 g-4">
            <!-- Các card thống kê... (giữ nguyên) -->
        </div>
        <hr class="my-4">
        <h4>🔍 Khám phá</h4>
        <div class="d-flex flex-wrap gap-2">
            <!-- Các nút... (giữ nguyên) -->
        </div>
    </div>

    <!-- Sách gợi ý ngẫu nhiên -->
    <div th:if="${randomBooks != null && !randomBooks.isEmpty()}">
        <hr class="my-4">
        <h4>📚 Có thể bạn sẽ thích</h4>
        <div class="d-flex flex-nowrap overflow-auto pb-3">
            <div class="flex-shrink-0 me-3" th:each="book : ${randomBooks}" style="width: 200px;">
                <a th:href="@{/books/{id}(id=${book.id})}"
                   class="card h-100 shadow-sm text-decoration-none text-dark position-relative overflow-hidden"
                   style="display: block;">
                    <!-- Ảnh bìa -->
                    <img th:if="${book.imageFilename != null && !book.imageFilename.isEmpty()}"
                         th:src="@{/uploads/{filename}(filename=${book.imageFilename})}"
                         onerror="this.onerror=null; this.src='/uploads/sample.png';"
                         class="card-img-top" alt="Ảnh bìa" style="height: 200px; object-fit: cover;">
                    <img th:unless="${book.imageFilename != null && !book.imageFilename.isEmpty()}"
                         th:src="@{/uploads/sample.png}"
                         class="card-img-top" alt="Ảnh bìa" style="height: 200px; object-fit: cover;">
                    <!-- Overlay nền đen mờ khi hover -->
                    <div class="card-overlay">
                        <h6 class="card-title text-white small mb-1" th:text="${book.title}">Tên sách</h6>
                        <p class="card-text text-white-50 small mb-1" th:text="${book.author}">Tác giả</p>
                        <span class="btn btn-sm btn-outline-light w-100">Xem chi tiết</span>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Sách được yêu thích -->
    <div th:if="${topBooks != null && !topBooks.isEmpty()}" sec:authorize="!hasAnyRole('LIBRARIAN','ADMIN')">
        <hr class="my-4">
        <h4>⭐ Sách được yêu thích</h4>
        <div class="d-flex flex-nowrap overflow-auto pb-3">
            <div class="flex-shrink-0 me-3" th:each="book : ${topBooks}" style="width: 200px;">
                <a th:href="@{/books/{id}(id=${book.id})}"
                   class="card h-100 shadow-sm text-decoration-none text-dark position-relative overflow-hidden"
                   style="display: block;">
                    <!-- Ảnh bìa -->
                    <img th:if="${book.imageFilename != null && !book.imageFilename.isEmpty()}"
                         th:src="@{/uploads/{filename}(filename=${book.imageFilename})}"
                         onerror="this.onerror=null; this.src='/uploads/sample.png';"
                         class="card-img-top" alt="Ảnh bìa" style="height: 200px; object-fit: cover;">
                    <img th:unless="${book.imageFilename != null && !book.imageFilename.isEmpty()}"
                         th:src="@{/uploads/sample.png}"
                         class="card-img-top" alt="Ảnh bìa" style="height: 200px; object-fit: cover;">
                    <!-- Overlay nền đen mờ khi hover -->
                    <div class="card-overlay">
                        <h6 class="card-title text-white small mb-1" th:text="${book.title}">Tên sách</h6>
                        <p class="card-text text-white-50 small mb-1" th:text="${book.author}">Tác giả</p>
                        <div class="text-warning small mb-1">
                            ⭐ <span th:text="${#numbers.formatDecimal(book.averageRating, 1, 1)}">0.0</span>
                            (<span th:text="${book.reviewCount}">0</span>)
                        </div>
                        <span class="btn btn-sm btn-outline-light w-100">Xem chi tiết</span>
                    </div>
                </a>
            </div>
        </div>
    </div>

</div>
<!-- Nhớ xóa thẻ <style> thừa nếu có -->
</body>
</html>
