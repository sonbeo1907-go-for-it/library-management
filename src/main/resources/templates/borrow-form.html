<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Mượn sách')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">📚 Mượn sách</h1>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Xác nhận mượn sách</h5>
                </div>
                <div class="card-body">
                    <!-- Thông tin sách -->
                    <div class="mb-3">
                        <p><strong>Tên sách:</strong> <span th:text="${book.title}">Tên sách</span></p>
                        <p><strong>Tác giả:</strong> <span th:text="${book.author}">Tác giả</span></p>
                        <p><strong>Số lượng có sẵn:</strong> <span th:text="${book.quantity}">0</span></p>
                    </div>

                    <!-- Ngày mượn và hạn trả dự kiến -->
                    <div class="alert alert-info">
                        <p><strong>Ngày mượn:</strong> <span th:text="${#temporals.format(borrowDate, 'dd/MM/yyyy')}"></span></p>
                        <p><strong>Hạn trả dự kiến:</strong> <span th:text="${#temporals.format(dueDate, 'dd/MM/yyyy')}"></span> (14 ngày)</p>
                    </div>

                    <form th:action="@{/borrow}" method="post">
                        <input type="hidden" name="bookId" th:value="${book.id}">

                        <div class="mb-3" sec:authorize="hasRole('LIBRARIAN')">
                            <label for="userId" class="form-label">Chọn độc giả</label>
                            <select name="userId" id="userId" class="form-select" required>
                                <option value="">-- Chọn người mượn --</option>
                                <option th:each="user : ${users}" th:value="${user.id}"
                                        th:text="${user.fullName} + ' (' + ${user.username} + ')'"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">✅ Xác nhận mượn</button>
                            <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <img th:if="${book.imageFilename}"
                 th:src="@{/uploads/{filename}(filename=${book.imageFilename})}"
                 class="img-fluid rounded" alt="Ảnh bìa">
            <div th:unless="${book.imageFilename}" class="bg-light rounded d-flex align-items-center justify-content-center" style="height: 200px;">
                <span class="text-muted">Chưa có ảnh</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
