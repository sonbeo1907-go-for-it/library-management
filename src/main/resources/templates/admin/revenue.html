<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(pageTitle='Báo cáo doanh thu')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">💰 Báo cáo doanh thu</h1>

    <!-- Bộ lọc tháng/năm -->
    <form class="row g-3 mb-4" th:action="@{/admin/revenue}" method="get">
        <div class="col-auto">
            <label class="col-form-label">Tháng:</label>
        </div>
        <div class="col-auto">
            <select name="month" class="form-select" onchange="this.form.submit()">
                <option th:each="m : ${#numbers.sequence(1, 12)}"
                        th:value="${m}" th:text="${m}"
                        th:selected="${m == month}"></option>
            </select>
        </div>
        <div class="col-auto">
            <label class="col-form-label">Năm:</label>
        </div>
        <div class="col-auto">
            <input type="number" name="year" class="form-control"
                   th:value="${year}" onchange="this.form.submit()" style="width: 100px;">
        </div>
    </form>

    <!-- Tổng tháng (card riêng, không nằm trong bảng) -->
    <div th:if="${summary != null}" class="row mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body text-center">
                    <h5 class="card-title">Tổng phí mượn</h5>
                    <p class="card-text display-6" th:text="${summary.formattedTotalRental}"></p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-warning">
                <div class="card-body text-center">
                    <h5 class="card-title">Tổng phí phạt</h5>
                    <p class="card-text display-6" th:text="${summary.formattedTotalFine}"></p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body text-center">
                    <h5 class="card-title">Tổng doanh thu</h5>
                    <p class="card-text display-6" th:text="${summary.formattedTotal}"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bảng chi tiết theo ngày -->
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>Ngày</th>
                <th>Phí mượn (VNĐ)</th>
                <th>Phí phạt (VNĐ)</th>
                <th>Tổng (VNĐ)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="rev : ${page.content}">
                <td th:text="${#temporals.format(rev.date, 'dd/MM/yyyy')}"></td>
                <td th:text="${rev.formattedRentalRevenue}"></td>
                <td th:text="${rev.formattedFineRevenue}"></td>
                <td th:text="${rev.formattedTotalRevenue}"></td>
            </tr>
            <tr th:if="${page.content.isEmpty()}">
                <td colspan="4" class="text-center text-muted">Không có dữ liệu doanh thu trong tháng này.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Phân trang -->
    <nav th:if="${page.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/revenue(year=${year}, month=${month}, page=${page.number - 1}, size=${page.size})}">« Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                th:classappend="${i == page.number} ? 'active'">
                <a class="page-link" th:href="@{/admin/revenue(year=${year}, month=${month}, page=${i}, size=${page.size})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/revenue(year=${year}, month=${month}, page=${page.number + 1}, size=${page.size})}">Sau »</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
