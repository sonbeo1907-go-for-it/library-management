<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(pageTitle='Danh sách sách')}">
<body>
<div th:fragment="content">
    <h1 class="mb-4">📖 Danh sách sách</h1>

    <!-- Hiển thị thông báo -->
    <div th:if="${successMessage}" class="alert alert-success auto-hide" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger auto-hide" th:text="${errorMessage}"></div>

    <!-- Form tìm kiếm -->
    <form th:action="@{/books}" method="get" class="row g-3 mb-4">
        <div class="col-md-8">
            <input type="text" name="keyword" class="form-control"
                   th:value="${keyword}" placeholder="Tìm theo tên sách hoặc tác giả...">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">🔍 Tìm</button>
        </div>
        <div class="col-md-2" sec:authorize="hasRole('LIBRARIAN')">
            <a th:href="@{/books/new}" class="btn btn-success w-100">➕ Thêm sách</a>
        </div>
    </form>

    <!-- Bảng danh sách sách -->
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>Ảnh bìa</th>
                <th>Tên sách</th>
                <th>Tác giả</th>
                <th>Số lượng</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td>
                    <img th:if="${book.imageFilename}"
                         th:src="@{/uploads/{filename}(filename=${book.imageFilename})}"
                         width="50" class="img-thumbnail">
                    <span th:unless="${book.imageFilename}" class="text-muted">—</span>
                </td>
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.quantity}"></td>
                <td>
                    <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-sm btn-info">👁️ Chi tiết</a>
                    <!-- Mượn sách (nếu còn số lượng) -->
                    <a th:if="${book.quantity > 0}" th:href="@{/borrow(bookId=${book.id})}" class="btn btn-sm btn-primary">📚 Mượn</a>
                    <!-- Quản lý cho Librarian -->
                    <span sec:authorize="hasRole('LIBRARIAN')">
                            <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-sm btn-warning">✏️ Sửa</a>
                            <a th:href="@{/books/{id}/delete(id=${book.id})}" class="btn btn-sm btn-danger confirm-delete">🗑️ Xóa</a>
                        </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(books)}">
                <td colspan="5" class="text-center text-muted">Không có sách nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
